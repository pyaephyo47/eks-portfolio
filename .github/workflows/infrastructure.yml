name: AWS Infrastructure Automation

on:
  push:
    branches:
      - main     # Runs safe dry-run checks on standard main branch pushes
    tags:
      - 'v*'     # Triggers full live production cloud builds when pushing a version tag (e.g., v1.0)

permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: Validates files and calculates plans on every single code movement
  ci-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::901816337753:role/github-actions-eks-deployer
        aws-region: us-east-1

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Run Safe Infrastructure Dry-Run Check
      run: |
        cd cloud-pre-stage/terraform
        terraform init -reconfigure
        terraform validate
        terraform plan

  # JOB 2: Executes live infrastructure provisioning ONLY when a version tag is pushed
  cd-deployment:
    runs-on: ubuntu-latest
    needs: ci-validation
    # STRICT CONSTRAINT: This block executes only if the triggering event is a tag starting with 'v'
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::901816337753:role/github-actions-eks-deployer
        aws-region: us-east-1

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Execute Live Infrastructure Spin-Up
      run: |
        cd cloud-pre-stage/terraform
        terraform init -reconfigure
        terraform apply --auto-approve

