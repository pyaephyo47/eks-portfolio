apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  # Safe to scale horizontally because the frontend is stateless
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-nginx
        # Placeholder image tag; your GitHub Actions pipeline will build and overwrite this
        image: YOUR_DOCKERHUB_USERNAME/multi-page-nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    # NodePort exposes the service outside the cluster on your Minikube node
    nodePort: 30080

